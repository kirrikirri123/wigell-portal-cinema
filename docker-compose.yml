services:
  mysql:
    image: mysql:8.0
    container_name: my-mysql # Skapas en temporär databas här inne i containern.
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: keycloak      #databasens namn
      MYSQL_USER: keycloak         #Vart är detta inlogg?
      MYSQL_PASSWORD: password    # vart är detta inlogg?
    ports:
      - "6606:3306" #6606 skapar en anslutning via SQLworkbench om man vill ha det. - 3306 används fortfarande internt.
    volumes:
      - mysql_data:/var/lib/mysql # här sparas all "databas-data"

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.4
    container_name: my-keycloak
    restart: unless-stopped
    command: start-dev
    environment:
      KC_DB: mysql
      KC_DB_URL: jdbc:mysql://mysql:3306/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KEYCLOAK_ADMIN: admin             #inlogg keycloak workbench
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8090:8080"
    depends_on:
      - mysql  #Den här containern startar inte innan mysql containern startar.

volumes:
  mysql_data: